# ============================================
# ESSENTIAL SETTINGS
# ============================================

# Fix Vim ESC delay
set -sg escape-time 0

# Increase scrollback buffer
set -g history-limit 50000

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Enable mouse support
set -g mouse on

# Enable focus events for vim autoread / gitgutter
set -g focus-events on

# Aggressive resize for multi-client
setw -g aggressive-resize on

# Do not eject me when killing a session
set-option -g detach-on-destroy off

# Disable renaming window from shell
set-option -g allow-rename off

# Set terminal with proper colors
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# ============================================
# KEY BINDINGS
# ============================================

# Remap prefix to Ctrl-space (avoid vim ctrl-b conflict)
unbind C-b
set -g prefix C-space
bind C-space send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

# Vim-style pane resizing
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r h resize-pane -L 10
bind -r l resize-pane -R 10

# Better pane splitting (and keep current path)
bind '"' split-window -h -c "#{pane_current_path}"
bind '%' split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# A Popup
bind g popup -w 80% -h 80% -d "#{pane_current_path}" -E "TMUX_IN_POPUP=1 zsh -il"

set -g status-left '#[bold]#(tmux-pane-context "#{pane_tty}" style) #(tmux-pane-context "#{pane_tty}" label) #[default] '
set -g status-left-length 12

# Custom colors for tmux-tools (my plugins)
set -g @my_blue colour24
set -g @my_red colour160
set -g @my_yellow colour220
set -g @my_grey colour16
set -g @my_white colour255
# set -g @my_orange colour160

# Status bar
set -g status-style "bg=#{E:@my_blue},fg=#{E:@my_white}"
set -g status-right '#[bold]#(nt-speed) ┃#{cpu_bg_color} CPU #{cpu_percentage} ┃#{ram_bg_color} RAM #{ram_percentage} ┃'
set -ag status-right " %a %l:%M:%S %p ┃ %Y-%m-%d ✝ "
set -g status-right-length 100
set -g @ram_medium_thresh "50"

# ============================================
# COPY MODE
# ============================================

# Use vi keys
setw -g mode-keys vi

# Vi-style copy bindings
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -i"

# ============================================
# PANE NAVIGATION
# ============================================

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind -T copy-mode-vi 'C-h' select-pane -L
bind -T copy-mode-vi 'C-j' select-pane -D
bind -T copy-mode-vi 'C-k' select-pane -U
bind -T copy-mode-vi 'C-l' select-pane -R
bind -T copy-mode-vi 'C-\' select-pane -l


# ============================================
# PLUGINS (via TPM)
# ============================================

# Install TPM first:
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
