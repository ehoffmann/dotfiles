name: leetcode
root: ~/code/leetcode

windows:
  - code:
      layout: main-vertical
      panes:
        - vim
        - ls *.c | entr -rcps 'gcc -std=c23 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Wformat=2 -O0 -g3 -fsanitize=address,undefined -fno-omit-frame-pointer "$0"'
        - echo "./a.out" | entr -rcps 'time $0'
